name: Release
# This should almost always run, but upload binaries only on tag.
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - '*.*.*'
# Cancel previous runs on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  RUST_TOOLCHAIN: nightly-2025-09-18
  UV_VERSION: 0.8.24
jobs:
  build:
    name: Build wheel
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
          - '3.14t'
        target:
          - 'x86_64-unknown-linux-gnu'
          - 'aarch64-unknown-linux-gnu'
          - 'universal2-apple-darwin'
          - 'x86_64-pc-windows-msvc'
          - 'aarch64-pc-windows-msvc'
        include:
          - target: 'x86_64-unknown-linux-gnu'
            runs-on: 'ubuntu-latest'
          - target: 'aarch64-unknown-linux-gnu'
            runs-on: 'ubuntu-24.04-arm'
          - target: 'universal2-apple-darwin'
            runs-on: 'macos-latest'
          - target: 'x86_64-pc-windows-msvc'
            runs-on: 'windows-latest'
          - target: 'aarch64-pc-windows-msvc'
            runs-on: 'windows-11-arm'
        exclude:
          - python-version: '3.10'
            target: 'aarch64-pc-windows-msvc'
          - python-version: '3.14t'
            target: 'x86_64-pc-windows-msvc'
          - python-version: '3.14t'
            target: 'aarch64-pc-windows-msvc'
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380 # v1.49.4
        with:
          target: ${{ matrix.target }}
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          manylinux: auto
          args: --release -i python${{ matrix.python-version }} --features unstable-simd
      - uses: astral-sh/setup-uv@5a7eac68fb9809dea845d802897dc5c723910fa3 # v7.1.3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --frozen --no-install-project
      - run: uv pip install ormsgpack --no-index -f target/wheels
      - run: uv run --no-sync pytest
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ormsgpack-${{ matrix.target }}-${{ matrix.python-version }}
          path: target/wheels
          retention-days: 1

  build-musllinux:
    name: Build wheel
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        target:
          - 'x86_64-unknown-linux-musl'
          - 'aarch64-unknown-linux-musl'
        include:
          - target: 'x86_64-unknown-linux-musl'
            platform: 'linux/amd64'
            runs-on: 'ubuntu-latest'
          - target: 'aarch64-unknown-linux-musl'
            platform: 'linux/arm64'
            runs-on: 'ubuntu-24.04-arm'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380 # v1.49.4
        with:
          target: ${{ matrix.target }}
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          manylinux: musllinux_1_2
          args: --release -i python${{ matrix.python-version }} --features unstable-simd
      - run: |
          scripts/test-in-container.sh \
              python:${{ matrix.python-version }}-alpine \
              ${{ matrix.platform }} \
              ${{ github.workspace }}
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ormsgpack-${{ matrix.target }}-${{ matrix.python-version }}
          path: target/wheels
          retention-days: 1

  build-linux-armv7:
    name: Build wheel
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        target:
          - 'armv7-unknown-linux-gnueabihf'
          - 'armv7-unknown-linux-musleabihf'
        include:
          - target: 'armv7-unknown-linux-gnueabihf'
            manylinux: 'auto'
            os: 'bookworm'
          - target: 'armv7-unknown-linux-musleabihf'
            manylinux: 'musllinux_1_2'
            os: 'alpine'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380 # v1.49.4
        with:
          target: ${{ matrix.target }}
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          manylinux: ${{ matrix.manylinux }}
          args: --release -i python${{ matrix.python-version }}
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - run: |
          scripts/test-in-container.sh \
              python:${{ matrix.python-version }}-${{ matrix.os }} \
              linux/arm/v7 \
              ${{ github.workspace }}
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ormsgpack-${{ matrix.target }}-${{ matrix.python-version }}
          path: target/wheels
          retention-days: 1

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: 3.11
      - uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380 # v1.49.4
        with:
          command: sdist
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ormsgpack-sdist
          path: target/wheels
          retention-days: 1

  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: Release
    runs-on: ubuntu-latest
    needs:
      - build
      - build-musllinux
      - build-linux-armv7
      - build-sdist
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: ormsgpack-*
          path: dist
          merge-multiple: true
      - uses: astral-sh/setup-uv@5a7eac68fb9809dea845d802897dc5c723910fa3 # v7.1.3
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv publish
